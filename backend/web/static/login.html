<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Dead Simple Analytics</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/static/img/favicon.png" sizes="32x32" />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="login-page">
    <div class="login-wrap">
      <div class="login-card card">
        <div class="login-brand">
          <img src="/static/img/logo.png" alt="" class="login-logo" width="56" height="31" />
          <h1>Dead Simple Analytics</h1>
        </div>
        <p class="tagline">Self-hosted views, clicks, and hovers</p>
        <p id="login-error" class="text-muted" hidden style="color: #a33"></p>
        <form class="login-form" id="login-form">
          <div class="form-row">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required />
          </div>
          <div class="form-row">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Sign in</button>
        </form>
      </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/login.js"></script>
  </body>
</html>
