<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Dead Simple Analytics</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/static/img/favicon.png" sizes="32x32" />
    <link rel="stylesheet" href="/static/css/app.css" />
    <script src="/components-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <header class="app-header" id="app-header"></header>

    <main class="page-main">
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
        </div>
        <div class="period-pills" aria-label="Chart period">
          <button type="button" class="period-pill" data-period="hours" data-value="24">24 hours</button>
          <button type="button" class="period-pill" data-period="days" data-value="7">7 days</button>
          <button type="button" class="period-pill active" data-period="days" data-value="14">14 days</button>
          <button type="button" class="period-pill" data-period="days" data-value="30">30 days</button>
          <button type="button" class="period-pill" data-period="days" data-value="90">90 days</button>
        </div>
      </div>

      <section class="chart-card card" aria-label="Visits over time">
        <h2>Visits over time</h2>
        <div class="chart-plot">
          <div id="visits-chart"></div>
        </div>
        <p id="visits-chart-detail" class="chart-hover-detail" aria-live="polite"></p>
      </section>

      <h2 class="section-title">Events</h2>
      <div class="filters-bar">
        <div>
          <label for="event-search">Search</label>
          <input type="search" id="event-search" placeholder="path, track id, session, referrer…" />
        </div>
        <div>
          <label for="type-filter">Type</label>
          <select id="type-filter">
            <option value="all">All</option>
            <option value="pageview">Pageview</option>
            <option value="click">Click</option>
            <option value="hover">Hover</option>
          </select>
        </div>
      </div>

      <div class="data-table-wrap card table-card">
        <table class="data-table" id="events-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Type</th>
              <th>Path</th>
              <th>Track ID</th>
              <th>Session</th>
              <th>Referrer</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody id="events-body"></tbody>
        </table>
      </div>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/shell.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/demo-footer.js"></script>
    <script>
      (function loadComponents() {
        var base = (window.__COMPONENTS_CDN__ || "/components").replace(/\/$/, "");
        var s = document.createElement("script");
        s.src = base + "/loader.js";
        s.onload = function () {
          (window.__componentsLoaderReady || Promise.resolve()).then(function () {
            return renderShell({ page: "dashboard" });
          }).then(function () {
            return window.initDashboard && window.initDashboard();
          });
        };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
