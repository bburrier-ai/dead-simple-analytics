services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa_dev_password
      POSTGRES_DB: dead_simple_analytics_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsa} -d dead_simple_analytics_test"]
      interval: 3s
      timeout: 3s
      retries: 10
